name: Django + PostGIS CI (auto makemigrations)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: test-secret-key-for-ci-only
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_ENGINE: django.contrib.gis.db.backends.postgis
      DB_NAME: fitness_db
      DB_USER: postgres
      DB_PASSWORD: testpassword
      DB_HOST: db
      DB_PORT: "5432"
      POSTGRES_DB: fitness_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpassword
      DJANGO_SETTINGS_MODULE: fitness.settings

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env <<EOF
          SECRET_KEY=${SECRET_KEY}
          DEBUG=${DEBUG}
          ALLOWED_HOSTS=${ALLOWED_HOSTS}
          DB_ENGINE=${DB_ENGINE}
          DB_NAME=${DB_NAME}
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}
          DB_HOST=${DB_HOST}
          DB_PORT=${DB_PORT}
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          EOF

      - name: Build and start services
        run: docker compose up -d --build

      - name: Wait for database to be ready
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          until docker exec $(docker compose ps -q db) pg_isready -U $POSTGRES_USER; do
            sleep 2
          done

      - name: Make migrations (auto)
        run: docker compose exec -T web python manage.py makemigrations --noinput || true

      - name: Apply migrations
        run: docker compose exec -T web python manage.py migrate --noinput

      - name: Run Django tests
        run: docker compose exec -T web python manage.py test

      - name: Shut down
        if: always()
        run: docker compose down -v
